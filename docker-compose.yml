services:
  postgresdb:
    image: postgres:15
    restart: unless-stopped
    container_name: postgresdb

    environment:
      POSTGRES_USER: nexform
      POSTGRES_PASSWORD: nexform
      POSTGRES_DB: nexform

    ports:
      - "5433:5432"

    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
